# Camera configuration
USB_CAM: true
MIPI_CAM: false
USB_CAM_DEVICE: /dev/video1
# 카메라 발행/YOLO용 원본 해상도. 차선 파이프라인은 아래 LANE_PROC 크기로 축소해 처리한다.
IMAGE_WIDTH: 640
IMAGE_HEIGHT: 480
# 차선 처리 해상도. opencv_node 가 이 크기로 다운스케일한 뒤 Canny/차선검출을 수행한다.
# ROI_TOP/px 튜닝값들은 이 해상도(320x160) 기준이므로 이 값을 바꾸면 차선 튜닝을 재조정해야 한다.
LANE_PROC_WIDTH: 320
LANE_PROC_HEIGHT: 160
ROI_TOP: 75
ROI_LEFT: 0

# Vehicle control parameters
STEER_TRIM: 0.10000000000000003

# Web server configuration
WEB_HOST: 0.0.0.0
WEB_PORT: 5000
BATTERY_TOPIC: /battery_status
IMAGE_TOPIC: /camera/image/compressed
CONTROL_TOPIC: /control
STORAGE_PATH: /
IMAGE_DISPLAY_WIDTH: 640
IMAGE_DISPLAY_HEIGHT: 480
OPENCV_DEBUG_MODE : true